<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: black; }
        #ui { 
            position: absolute; z-index: 9999; bottom: 30px; left: 50%; 
            transform: translateX(-50%); width: 100%; text-align: center;
        }
        button { 
            padding: 20px 40px; border-radius: 50px; border: none; 
            background: #ff0055; color: white; font-size: 18px; 
            font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div id="ui">
        <button id="playButton">VER VIDEO EN PANTALLA COMPLETA</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-assets>
            <video id="miVideo" src="./video.mp4" preload="auto" crossorigin="anonymous" webkit-playsinline playsinline></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-video src="#miVideo" width="1" height="0.6" opacity="0.5"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const btn = document.querySelector("#playButton");
        const video = document.querySelector("#miVideo");

        btn.addEventListener('click', function() {
            // Intentamos reproducir el video primero
            video.play();
            
            // Forzamos la pantalla completa inmediatamente
            if (video.requestFullscreen) {
                video.requestFullscreen();
            } else if (video.webkitEnterFullscreen) {
                video.webkitEnterFullscreen(); // Esto es lo que hace que en iPhone ocupe toda la pantalla
            } else if (video.webkitRequestFullscreen) {
                video.webkitRequestFullscreen();
            } else if (video.msRequestFullscreen) {
                video.msRequestFullscreen();
            }

            // Ocultamos el botón después de clicar
            document.querySelector("#ui").style.display = "none";
        });

        // Si el usuario sale de pantalla completa, pausamos para no gastar batería
        video.addEventListener('webkitendfullscreen', () => { video.pause(); });
        video.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) video.pause();
        });
    </script>
</body>
</html>
